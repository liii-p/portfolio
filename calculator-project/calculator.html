<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styling.css" />
        <title>Calculator</title>
    </head>
    <body>
        <section>
            <div class="calc">
                <div class="calc-display">
                    <p class="calc-display__text">0123456789</p>
                </div>
                <div class="calc__pad">
                    <div class="calc__button calc__button__border">MC</div>
                    <div class="calc__button calc__button__border">MR</div>
                    <div class="calc__button calc__button__border">MS</div>
                    <div class="calc__button calc__button__border">M+</div>
                    <div class="calc__button calc__button__border">M-</div>
                    <div class="calc__button calc__button__border">&lt;</div>
                    <div class="calc__button calc__button__border">CE</div>
                    <div class="calc__button calc__button__border">C</div>
                    <div class="calc__button calc__button__border">+-</div>
                    <div class="calc__button calc__button__border">V</div>
                    <div class="calc__button calc__button__border">7</div>
                    <div class="calc__button calc__button__border">8</div>
                    <div class="calc__button calc__button__border">9</div>
                    <div class="calc__button calc__button__border">/</div>
                    <div class="calc__button calc__button__border">%</div>
                    <!-- </div> -->

                    <!-- <div class="calc-row"> -->
                    <div class="calc__button calc__button__border">4</div>
                    <div class="calc__button calc__button__border">5</div>
                    <div class="calc__button calc__button__border">6</div>
                    <div class="calc__button calc__button__border">*</div>
                    <div class="calc__button calc__button__border">1/x</div>
                    <div class="calc__button calc__button__border special">
                        1
                    </div>
                    <div class="calc__button calc__button__border special">
                        2
                    </div>
                    <div class="calc__button calc__button__border special">
                        3
                    </div>
                    <div class="calc__button calc__button__border special">
                        -
                    </div>
                    <div
                        id="equal"
                        class="calc__button calc__button__border special"
                    >
                        =
                    </div>

                    <div
                        class="calc__button calc__button__border special"
                        id="zero"
                    >
                        0
                    </div>
                    <div class="calc__button calc__button__border special">
                        .
                    </div>
                    <div class="calc__button calc__button__border special">
                        +
                    </div>
                </div>
            </div>
            <p>Built by Lianna</p>
        </section>
    </body>
    <script src="script.js"></script>
</html>
